<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saba Bushra | Resume</title>
    <link rel="shortcut icon" href="images/bushra_pic.jpg" type="image/x-icon">
      <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #f5f5f5;   
      font-family: 'Inter', sans-serif;
    }
    .hero {
      background-color: #ffffff;
      text-align: center;
      padding: 80px 20px;           
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      color: #2d3748;              
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 16px;
      color: #718096;               
      max-width: 600px;            
      margin: 0 auto 40px auto;    
      line-height: 1.7;
    }

    .hero .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;

      padding: 14px 32px;
      border: 2px solid #222424;   
      border-radius: 50px;        
      background-color: transparent;

      color: rgb(119, 111, 111);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;

      cursor: pointer;
      transition: all 0.3s ease;   
    }

  
    .hero .btn:hover {
      background-color: rgb(54, 52, 87);
      color: #ffffff;
    }
    .hero .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .cv-img img{
        padding:100px;
    }

  </style>
</head>

<body>

  <section class="hero">

    <h1>Online Resume</h1>

    <div class="underline"></div>

    <p>
      Summarise your career here. You can make a PDF version of
      your resume using our free Sketch template here.
    </p>

    <!-- Download button -->
    <a href="#" class="btn">
      <!-- Simple PDF icon (SVG, no extra library needed) -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M10 13h4m-2-2v4"/>
      </svg>
      Download PDF Version
    </a>

  </section>

  <section class="cv-img">
    <img src="images/Bushra cv.png" alt="">
  </section>

</body>
</html>
